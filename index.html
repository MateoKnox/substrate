<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOW — interactive particle field</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; position:absolute; inset:0; }
#bloom { z-index:1; }
#main  { z-index:2; cursor:none; }

/* ── UI OVERLAY ───────────────────────────────── */
#ui {
  position:fixed; inset:0; z-index:10;
  pointer-events:none;
  font-family:'Inter',sans-serif;
}

/* title */
#title {
  position:absolute; top:24px; left:28px;
  pointer-events:none;
}
#title h1 {
  font-size:28px; font-weight:300; letter-spacing:8px;
  color:rgba(255,255,255,0.9);
  text-shadow:0 0 30px rgba(255,255,255,0.3);
}
#title p { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; margin-top:3px; }

/* hint */
#hint {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
  transition:opacity 2s;
}
#hint p { font-size:14px; color:rgba(255,255,255,0.5); letter-spacing:1px; line-height:2; }
#hint .key { display:inline-block; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:4px; padding:1px 7px; font-size:11px; }

/* controls bottom */
#controls {
  position:absolute; bottom:24px; left:50%;
  transform:translateX(-50%);
  display:flex; align-items:center; gap:10px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:40px;
  padding:10px 20px;
  pointer-events:all;
}

.sep { width:1px; height:20px; background:rgba(255,255,255,0.1); }

.ctrl-label { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-transform:uppercase; }

.palette-btn {
  width:20px; height:20px; border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:all 0.2s;
  outline:none;
  background:none;
  position:relative;
}
.palette-btn::after {
  content:''; position:absolute; inset:-4px;
  border-radius:50%;
  border:2px solid transparent;
  transition:border-color 0.2s;
}
.palette-btn.active::after { border-color:rgba(255,255,255,0.7); }
.palette-btn:hover { transform:scale(1.2); }

.mode-btn {
  padding:5px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.15);
  background:transparent;
  color:rgba(255,255,255,0.5);
  font-family:'Inter',sans-serif;
  font-size:11px;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:all 0.2s;
  outline:none;
}
.mode-btn:hover { color:rgba(255,255,255,0.8); border-color:rgba(255,255,255,0.3); }
.mode-btn.active { color:#fff; border-color:rgba(255,255,255,0.6); background:rgba(255,255,255,0.08); }

.icon-btn {
  width:30px; height:30px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:transparent;
  color:rgba(255,255,255,0.5);
  font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
  outline:none;
}
.icon-btn:hover { color:#fff; border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.06); }

/* well count badge */
#well-count {
  position:absolute; bottom:80px; left:50%;
  transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,0.3);
  letter-spacing:1px; pointer-events:none;
  transition:opacity 0.5s;
}

/* cursor */
#cursor {
  position:fixed;
  width:40px; height:40px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.4);
  pointer-events:none;
  z-index:20;
  transform:translate(-50%,-50%);
  transition:width 0.15s, height 0.15s, border-color 0.3s;
}
#cursor.repel { border-color:rgba(255,100,100,0.6); width:60px; height:60px; }
#cursor.attract { border-color:rgba(100,200,255,0.6); }

/* well markers */
.well-marker {
  position:fixed;
  width:8px; height:8px;
  border-radius:50%;
  pointer-events:none;
  z-index:15;
  transform:translate(-50%,-50%);
  animation:wellPulse 2s ease-in-out infinite;
}
@keyframes wellPulse {
  0%,100%{ opacity:0.6; transform:translate(-50%,-50%) scale(1); }
  50%    { opacity:1;   transform:translate(-50%,-50%) scale(1.4); }
}
</style>
</head>
<body>

<canvas id="bloom"></canvas>
<canvas id="main"></canvas>
<div id="cursor"></div>

<div id="ui">
  <div id="title">
    <h1>FLOW</h1>
    <p>INTERACTIVE PARTICLE FIELD</p>
  </div>

  <div id="hint">
    <p>
      <span class="key">click</span> to place a gravity well<br>
      <span class="key">right click</span> to repel particles<br>
      <span class="key">move</span> your mouse to shape the flow
    </p>
  </div>

  <div id="well-count"></div>

  <div id="controls">
    <span class="ctrl-label">Palette</span>
    <button class="palette-btn active" id="p0" title="Cosmic" style="background:linear-gradient(135deg,#667eea,#764ba2)" onclick="setPalette(0)"></button>
    <button class="palette-btn" id="p1" title="Inferno" style="background:linear-gradient(135deg,#f12711,#f5af19)" onclick="setPalette(1)"></button>
    <button class="palette-btn" id="p2" title="Ocean" style="background:linear-gradient(135deg,#0575e6,#00f260)" onclick="setPalette(2)"></button>
    <button class="palette-btn" id="p3" title="Aurora" style="background:linear-gradient(135deg,#a8ff78,#78ffd6)" onclick="setPalette(3)"></button>
    <button class="palette-btn" id="p4" title="Void" style="background:linear-gradient(135deg,#f7f8f8,#acbb78)" onclick="setPalette(4)"></button>

    <div class="sep"></div>
    <span class="ctrl-label">Mode</span>
    <button class="mode-btn active" id="m0" onclick="setMode('flow')">Flow</button>
    <button class="mode-btn" id="m1" onclick="setMode('vortex')">Vortex</button>
    <button class="mode-btn" id="m2" onclick="setMode('chaos')">Chaos</button>
    <button class="mode-btn" id="m3" onclick="setMode('radial')">Radial</button>

    <div class="sep"></div>
    <button class="icon-btn" onclick="clearWells()" title="Clear gravity wells">⊗</button>
    <button class="icon-btn" onclick="resetParticles()" title="Reset particles">↺</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// SETUP
// ════════════════════════════════════════════════════
const mainCanvas  = document.getElementById('main');
const bloomCanvas = document.getElementById('bloom');
const ctx  = mainCanvas.getContext('2d');
const bctx = bloomCanvas.getContext('2d');
const cursor = document.getElementById('cursor');
const hintEl = document.getElementById('hint');
const wellCountEl = document.getElementById('well-count');

let W, H;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  mainCanvas.width  = bloomCanvas.width  = W;
  mainCanvas.height = bloomCanvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); resetParticles(); });

// ════════════════════════════════════════════════════
// NOISE (value noise, smooth interpolation)
// ════════════════════════════════════════════════════
function hash(x, y){
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}
function smoothstep(t){ return t*t*(3-2*t); }
function noise2D(x, y){
  const xi=Math.floor(x), yi=Math.floor(y);
  const xf=x-xi, yf=y-yi;
  const u=smoothstep(xf), v=smoothstep(yf);
  return hash(xi,yi)*(1-u)*(1-v) + hash(xi+1,yi)*u*(1-v)
       + hash(xi,yi+1)*(1-u)*v   + hash(xi+1,yi+1)*u*v;
}
function noise3D(x, y, t){
  // Fake 3D by mixing two 2D slices
  const t0=Math.floor(t), tf=smoothstep(t-t0);
  return noise2D(x+t0*7.3, y+t0*3.1) * (1-tf) + noise2D(x+(t0+1)*7.3, y+(t0+1)*3.1) * tf;
}

// ════════════════════════════════════════════════════
// PARTICLES (typed arrays for perf)
// ════════════════════════════════════════════════════
const N_PARTICLES = 4000;
const px  = new Float32Array(N_PARTICLES);
const py  = new Float32Array(N_PARTICLES);
const pvx = new Float32Array(N_PARTICLES);
const pvy = new Float32Array(N_PARTICLES);
const page = new Float32Array(N_PARTICLES);

function resetParticles(){
  for(let i=0;i<N_PARTICLES;i++){
    px[i]  = Math.random()*W;
    py[i]  = Math.random()*H;
    pvx[i] = (Math.random()-0.5)*0.5;
    pvy[i] = (Math.random()-0.5)*0.5;
    page[i] = Math.random()*200;
  }
}

// ════════════════════════════════════════════════════
// GRAVITY WELLS
// ════════════════════════════════════════════════════
const wells = []; // { x, y, strength, el }

function addWell(x, y, strength){
  const el = document.createElement('div');
  el.className = 'well-marker';
  el.style.left = x+'px';
  el.style.top  = y+'px';
  el.style.background = strength > 0 ? 'rgba(100,200,255,0.8)' : 'rgba(255,80,80,0.8)';
  el.style.boxShadow  = strength > 0
    ? '0 0 12px rgba(100,200,255,0.8)' : '0 0 12px rgba(255,80,80,0.8)';
  document.body.appendChild(el);
  wells.push({ x, y, strength, el });
  updateWellCount();
}

function clearWells(){
  while(wells.length){
    const w = wells.pop();
    if(w.el && w.el.parentNode) w.el.parentNode.removeChild(w.el);
  }
  updateWellCount();
}

function updateWellCount(){
  if(wells.length === 0){ wellCountEl.style.opacity='0'; return; }
  wellCountEl.style.opacity='1';
  wellCountEl.textContent = `${wells.length} gravity well${wells.length>1?'s':''} active  ·  right-click to add repulsors  ·  ⊗ to clear`;
}

// ════════════════════════════════════════════════════
// PALETTES
// ════════════════════════════════════════════════════
let paletteIdx=0;
const PALETTES = [
  // Cosmic: blues/purples/white
  (speed,x,y,t) => {
    const h = 220 + speed*80;
    const s = 70 + speed*20;
    const l = 30 + speed*55;
    return `hsl(${h},${s}%,${l}%)`;
  },
  // Inferno: black → red → orange → yellow
  (speed,x,y,t) => {
    const h = speed*55;
    const s = 100;
    const l = 15 + speed*65;
    return `hsl(${h},${s}%,${l}%)`;
  },
  // Ocean: teals, aquas, deep blues
  (speed,x,y,t) => {
    const h = 170 + speed*60;
    const s = 80 + speed*20;
    const l = 25 + speed*55;
    return `hsl(${h},${s}%,${l}%)`;
  },
  // Aurora: greens → pinks → purples
  (speed,x,y,t) => {
    const h = 100 + speed*200 + Math.sin(t*0.5)*20;
    const s = 70;
    const l = 35 + speed*45;
    return `hsl(${h},${s}%,${l}%)`;
  },
  // Void: monochrome white/grey
  (speed,x,y,t) => {
    const l = 10 + speed*85;
    return `hsl(0,0%,${l}%)`;
  },
];

function setPalette(i){
  paletteIdx = i;
  document.querySelectorAll('.palette-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
}

// ════════════════════════════════════════════════════
// FLOW MODES
// ════════════════════════════════════════════════════
let mode = 'flow';
function setMode(m){
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  const modeIds = {flow:'m0',vortex:'m1',chaos:'m2',radial:'m3'};
  document.getElementById(modeIds[m]).classList.add('active');
}

function fieldAngle(x, y, t){
  const scale = 1/280;
  switch(mode){
    case 'flow': {
      const n = noise3D(x*scale, y*scale, t*0.08);
      return n * Math.PI * 4;
    }
    case 'vortex': {
      // Spiral toward centre + noise
      const cx=W/2, cy=H/2;
      const dx=x-cx, dy=y-cy;
      const baseAngle = Math.atan2(dy,dx) + Math.PI/2;
      const n = noise3D(x*scale, y*scale, t*0.05)*0.8;
      return baseAngle + n;
    }
    case 'chaos': {
      const n1 = noise3D(x*scale*2, y*scale*2, t*0.2);
      const n2 = noise3D(x*scale*2+100, y*scale*2+100, t*0.2);
      return (n1-0.5)*Math.PI*6 + n2*2;
    }
    case 'radial': {
      // Expand outward from centre + noise
      const cx=W/2, cy=H/2;
      const dx=x-cx, dy=y-cy;
      const baseAngle = Math.atan2(dy,dx);
      const n = noise3D(x*scale, y*scale, t*0.04)*0.6;
      return baseAngle + n;
    }
  }
  return 0;
}

// ════════════════════════════════════════════════════
// MOUSE
// ════════════════════════════════════════════════════
let mouseX=W/2, mouseY=H/2, mouseOnScreen=false;
let hintShown=true;

document.addEventListener('mousemove', e=>{
  mouseX = e.clientX; mouseY = e.clientY;
  mouseOnScreen = true;
  cursor.style.left = mouseX+'px';
  cursor.style.top  = mouseY+'px';
  if(hintShown){ hintEl.style.opacity='0'; setTimeout(()=>hintEl.style.display='none',2000); hintShown=false; }
});
document.addEventListener('mouseleave', ()=>{ mouseOnScreen=false; });

document.addEventListener('contextmenu', e=>{ e.preventDefault(); addWell(e.clientX, e.clientY, -0.6); });
mainCanvas.addEventListener('click', e=>{ addWell(e.clientX, e.clientY, 0.8); });

// ════════════════════════════════════════════════════
// SIMULATION
// ════════════════════════════════════════════════════
const SPEED = 1.8;
const DRAG  = 0.94;
const MOUSE_RADIUS = 120;
const WELL_RADIUS  = 200;

let time = 0;

function update(){
  time += 1;
  const pf = PALETTES[paletteIdx];

  for(let i=0;i<N_PARTICLES;i++){
    page[i]++;

    // Flow field force
    const angle = fieldAngle(px[i], py[i], time);
    pvx[i] += Math.cos(angle) * 0.12;
    pvy[i] += Math.sin(angle) * 0.12;

    // Mouse influence (soft attract toward mouse)
    if(mouseOnScreen){
      const dx = mouseX - px[i];
      const dy = mouseY - py[i];
      const d2 = dx*dx + dy*dy;
      if(d2 < MOUSE_RADIUS*MOUSE_RADIUS){
        const d = Math.sqrt(d2);
        const f = (1 - d/MOUSE_RADIUS) * 0.18;
        pvx[i] += (dx/d) * f;
        pvy[i] += (dy/d) * f;
      }
    }

    // Gravity wells
    for(const w of wells){
      const dx = w.x - px[i];
      const dy = w.y - py[i];
      const d2 = dx*dx + dy*dy;
      if(d2 < WELL_RADIUS*WELL_RADIUS && d2 > 4){
        const d = Math.sqrt(d2);
        const f = w.strength * (1 - d/WELL_RADIUS) * 0.35;
        pvx[i] += (dx/d) * f;
        pvy[i] += (dy/d) * f;
      }
    }

    // Drag
    pvx[i] *= DRAG;
    pvy[i] *= DRAG;

    // Speed cap
    const spd = Math.sqrt(pvx[i]*pvx[i] + pvy[i]*pvy[i]);
    if(spd > SPEED){ pvx[i] = pvx[i]/spd*SPEED; pvy[i] = pvy[i]/spd*SPEED; }

    // Move
    px[i] += pvx[i];
    py[i] += pvy[i];

    // Wrap edges (smooth)
    if(px[i] < -2) px[i] += W+4;
    if(px[i] > W+2) px[i] -= W+4;
    if(py[i] < -2) py[i] += H+4;
    if(py[i] > H+2) py[i] -= H+4;
  }
}

// ════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════
let frameCount = 0;
const TRAIL_ALPHA = 0.05; // lower = longer trails

function draw(){
  // Fade to black (creates trails)
  ctx.fillStyle = `rgba(0,0,0,${TRAIL_ALPHA})`;
  ctx.fillRect(0, 0, W, H);

  const pf = PALETTES[paletteIdx];

  // Draw particles
  for(let i=0;i<N_PARTICLES;i++){
    const spd = Math.sqrt(pvx[i]*pvx[i] + pvy[i]*pvy[i]);
    const normSpd = Math.min(spd / SPEED, 1);
    const color = pf(normSpd, px[i]/W, py[i]/H, time*0.01);

    // Line from old to new position for smoother appearance
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.8 + normSpd * 0.7;
    ctx.globalAlpha = 0.6 + normSpd * 0.4;
    ctx.beginPath();
    ctx.moveTo(px[i] - pvx[i]*2, py[i] - pvy[i]*2);
    ctx.lineTo(px[i], py[i]);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Bloom pass
  bctx.clearRect(0,0,W,H);
  bctx.filter = 'blur(14px)';
  bctx.globalAlpha = 0.25;
  bctx.drawImage(mainCanvas, 0, 0);
  bctx.filter = 'none';
  bctx.globalAlpha = 1;
}

// ════════════════════════════════════════════════════
// CURSOR STYLE
// ════════════════════════════════════════════════════
let lastCursorClass='';
function updateCursor(){
  const cls = wells.length > 0 ? 'attract' : 'attract';
  if(cls !== lastCursorClass){
    cursor.className = cls;
    lastCursorClass = cls;
  }
}

// ════════════════════════════════════════════════════
// LOOP
// ════════════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  update();
  draw();
  frameCount++;
}

resetParticles();
loop();
</script>
</body>
</html>
